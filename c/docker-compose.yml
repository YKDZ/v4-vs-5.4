services:
  postgres:
    image: postgres:16-alpine
    container_name: termbase-postgres
    environment:
      POSTGRES_USER: termbase
      POSTGRES_PASSWORD: termbase
      POSTGRES_DB: termbase
    ports:
      - '5432:5432'
    volumes:
      - termbase-pgdata:/var/lib/postgresql/data

volumes:
  termbase-pgdata:
